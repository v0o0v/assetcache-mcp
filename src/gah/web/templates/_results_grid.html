{# M5 — 결과 영역 fragment.
   상단 툴바 (그리드/리스트/카드 크기/정렬/카운트) + 카드들 + 페이지네이션.
   $store.search.viewMode (grid|list) 에 따라 카드 partial 선택.
   서버 렌더 시점엔 viewMode 를 모르므로 Alpine x-if 로 클라이언트가 분기. #}

<div class="results-toolbar">
  <div class="view-toggle">
    <button type="button"
            class="view-btn"
            :class="{ active: $store.search.viewMode === 'grid' }"
            @click="$store.search.viewMode = 'grid'"
            aria-label="{{ _('그리드') }}">
      🖼 <span>{{ _("그리드") }}</span>
    </button>
    <button type="button"
            class="view-btn"
            :class="{ active: $store.search.viewMode === 'list' }"
            @click="$store.search.viewMode = 'list'"
            aria-label="{{ _('리스트') }}">
      ≡ <span>{{ _("리스트") }}</span>
    </button>
  </div>

  <div class="size-toggle">
    <button type="button" class="size-btn"
            :class="{ active: $store.search.cardSize === 's' }"
            @click="$store.search.cardSize = 's'">S</button>
    <button type="button" class="size-btn"
            :class="{ active: $store.search.cardSize === 'm' }"
            @click="$store.search.cardSize = 'm'">M</button>
    <button type="button" class="size-btn"
            :class="{ active: $store.search.cardSize === 'l' }"
            @click="$store.search.cardSize = 'l'">L</button>
  </div>

  <div class="sort-control">
    <label for="sort-select" class="sr-only">{{ _("정렬") }}</label>
    <select id="sort-select"
            x-model="$store.search.sort"
            @change="htmx.trigger(document.querySelector('form.search-bar'), 'submit')">
      <option value="score">{{ _("점수↓") }}</option>
      <option value="added_desc">{{ _("추가일↓") }}</option>
      <option value="added_asc">{{ _("추가일↑") }}</option>
      <option value="name_asc">{{ _("이름↑") }}</option>
      <option value="name_desc">{{ _("이름↓") }}</option>
      <option value="size_desc">{{ _("크기↓") }}</option>
      <option value="size_asc">{{ _("크기↑") }}</option>
    </select>
  </div>

  <div class="total-count">
    <strong>{{ total }}</strong> {{ _("자산") }}
  </div>
</div>

<div class="results-cards"
     :class="['view-mode-' + $store.search.viewMode, 'card-size-' + $store.search.cardSize]">
  <template x-if="$store.search.viewMode === 'grid' || !$store.search.viewMode">
    <div class="grid-container">
      {% for row in rows %}
        {% include "_card_wide.html" %}
      {% endfor %}
    </div>
  </template>
  <template x-if="$store.search.viewMode === 'list'">
    <div class="list-container">
      {% for row in rows %}
        {% include "_card_list.html" %}
      {% endfor %}
    </div>
  </template>
</div>

{% if next_offset is not none %}
  <button class="load-more"
          hx-post="/ui/search-results"
          hx-target="#results"
          hx-swap="beforeend"
          hx-include="form.search-bar"
          hx-vals='{"offset": {{ next_offset }}}'>{{ _("더 보기") }}</button>
{% endif %}
