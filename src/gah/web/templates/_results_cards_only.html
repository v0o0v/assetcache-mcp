{# M5 — 카드 전용 fragment.
   초기 로드(_results_grid.html 에서 include) 와
   페이지네이션 더 보기(offset>0, ui_search_results 직접 반환) 모두 사용.
   더 보기 버튼은 hx-target="this" + hx-swap="outerHTML" 로 자기 자신을 교체 →
   새 카드 batch + 새 더 보기 버튼(없으면 버튼 사라짐). #}

<div class="cards-batch">
  <template x-if="$store.search.viewMode === 'grid' || !$store.search.viewMode">
    <div class="grid-container">
      {% for row in rows %}
        {% include "_card_wide.html" %}
      {% endfor %}
    </div>
  </template>
  <template x-if="$store.search.viewMode === 'list'">
    <div class="list-container">
      {% for row in rows %}
        {% include "_card_list.html" %}
      {% endfor %}
    </div>
  </template>
</div>

{% if next_offset is not none %}
  <button class="load-more"
          hx-post="/ui/search-results"
          hx-target="this"
          hx-swap="outerHTML"
          hx-include="form.search-bar"
          hx-vals='{"offset": {{ next_offset }}}'>{{ _("더 보기") }}</button>
{% endif %}
